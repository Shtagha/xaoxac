<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Komorebi Space</title>
    <style>
        /* 1. Hiệu ứng nắng lóe (Light Leak) */
        .sun-glare {
            position: fixed;
            top: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, rgba(255, 250, 215, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            filter: blur(80px);
            z-index: 1;
            pointer-events: none;
            animation: pulse-glare 10s infinite alternate ease-in-out;
        }

        @keyframes pulse-glare {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.6; transform: scale(1.15) translate(-20px, 20px); }
        }

        /* 2. Hiệu ứng lá rơi */
        .leaf-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .leaf {
            position: absolute;
            background: #d1c1a5; /* Màu beige lá khô */
            border-radius: 2px 12px;
            opacity: 0.4;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { 
                top: -10%; 
                transform: translateX(0) rotate(0deg); 
                opacity: 0; 
            }
            15% { opacity: 0.4; }
            85% { opacity: 0.4; }
            100% { 
                top: 110%; 
                transform: translateX(120px) rotate(480deg); 
                opacity: 0; 
            }
        }

        /* Làm mờ hậu cảnh card */
        .glass-card {
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
    </style>
</head>

    <div class="sun-glare"></div>
    <div class="leaf-container" id="leaf-container"></div>
