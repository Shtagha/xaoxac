<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Keyring - Komorebi Space</title>
</head>
<body class="bg-[#fdfcfb] text-[#4a4543] min-h-screen font-sans p-6">

    <nav class="p-8 flex justify-between items-center max-w-6xl mx-auto border-b border-stone-100">
        <a href="index.html" class="text-[#8c7851] tracking-[0.2em] uppercase text-xs hover:opacity-50 transition-all">
            ← Quay lại
        </a>
        <h2 class="text-xl font-light tracking-[0.4em] uppercase text-[#8c7851]">Keyring</h2>
        <div class="w-10"></div> </nav>

    <main class="max-w-6xl mx-auto p-6 mt-10">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16">
            <div class="col-span-full text-center py-20">
                <p class="text-stone-400 italic tracking-widest animate-pulse">Đang tải bộ sưu tập...</p>
            </div>
        </div>
    </main>

    <footer class="mt-20 pb-10 text-center">
        <p class="text-[9px] tracking-[0.4em] text-stone-300 uppercase italic">Komorebi Space © 2026</p>
    </footer>

    <script>
        // --- CẤU HÌNH SANITY CỦA BẠN ---
        const PROJECT_ID = "6bpdec4j"; // ID lấy từ hình ảnh bạn gửi
        const DATASET = "production";
        
        // Câu lệnh lấy dữ liệu: Lấy tên, giá, và đường dẫn ảnh
        const QUERY = encodeURIComponent('*[_type == "product"]{name, price, "imageUrl": image.asset->url}');
        const URL = `https://${PROJECT_ID}.api.sanity.io/v2021-10-21/data/query/${DATASET}?query=${QUERY}`;

        async function loadProducts() {
            try {
                const response = await fetch(URL);
                const data = await response.json();
                const products = data.result;
                const container = document.getElementById('product-list');

                if (!products || products.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-20">
                            <p class="text-stone-400">Chưa có sản phẩm nào trong kho ảnh.</p>
                        </div>`;
                    return;
                }

                // Render danh sách sản phẩm ra HTML
                container.innerHTML = products.map(item => `
                    <div class="group flex flex-col items-center">
                        <div class="w-full overflow-hidden rounded-3xl aspect-[3/4] bg-stone-100 shadow-sm border border-stone-50">
                            <img src="${item.imageUrl}" 
                                 alt="${item.name}" 
                                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000 ease-in-out">
                        </div>
                        <div class="mt-8 text-center">
                            <h3 class="text-[#8c7851] tracking-[0.2em] uppercase text-sm font-light">${item.name}</h3>
                            <div class="mt-2 h-px bg-stone-200 w-8 mx-auto"></div>
                            <p class="text-stone-400 text-xs mt-3 italic font-serif">
                                ${new Intl.NumberFormat('vi-VN').format(item.price)} VND
                            </p>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Lỗi kết nối Sanity:", error);
                document.getElementById('product-list').innerHTML = "<p class='text-center w-full'>Không thể kết nối với dữ liệu Admin.</p>";
            }
        }

        // Chạy hàm tải sản phẩm
        loadProducts();
    </script>
